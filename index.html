<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gym Timer & Music (v4.1 - Spotify iFrame + Login)</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Spotify iFrame API (control real de reproducción con tu cuenta) -->
    <script src="https://open.spotify.com/embed/iframe-api/v1" async></script>
    <style>
        html, body {
            height: 100dvh;
            overflow: hidden;
        }
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            background-color: #121212;
        }
        #spotify-embed-panel {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.35s ease, opacity 0.35s ease, margin 0.35s ease;
        }
        #spotify-embed-panel.abierto {
            max-height: 320px;
            opacity: 1;
        }
        .control-disabled {
            opacity: 0.35;
            pointer-events: none;
        }
    </style>
</head>
<body class="text-white flex flex-col justify-between font-sans">

    <!-- ESTADO SUPERIOR (toca para mostrar/ocultar el panel de conexión con Spotify) -->
    <div class="w-full pt-4 px-6 landscape:pt-1.5 landscape:pb-0 flex justify-between items-center text-xs tracking-wider text-gray-400 shrink-0">
        <button id="spotify-status" class="flex items-center gap-2 cursor-pointer">
            <span id="spotify-status-dot" class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>
            <span id="spotify-status-text">CONECTANDO CON SPOTIFY...</span>
        </button>
        <svg class="w-5 h-5 text-gray-400" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424c-.18.295-.565.387-.86.207-2.377-1.454-5.37-1.783-8.894-.982-.336.075-.668-.135-.744-.47-.075-.336.135-.668.47-.743 3.856-.88 7.15-.51 9.822 1.13.296.178.387.563.206.858zm1.224-2.72c-.227.367-.707.487-1.074.26-2.72-1.672-6.87-2.157-10.08-1.182-.413.125-.847-.107-.972-.52-.125-.413.108-.847.52-.972 3.67-1.114 8.243-.574 11.347 1.33.367.226.487.706.259 1.074zm.105-2.832C14.383 8.805 8.417 8.607 4.966 9.654c-.54.164-1.107-.146-1.27-.687-.164-.54.147-1.107.687-1.27 3.972-1.206 10.556-.977 14.62 1.436.485.288.643.91.355 1.396-.288.485-.91.642-1.396.355z"/>
        </svg>
    </div>

    <!-- SECCIÓN CENTRAL: vertical = columna | horizontal = timer izquierda, botones derecha -->
    <div class="flex-1 min-h-0 flex flex-col landscape:flex-row items-center justify-center gap-6 landscape:gap-8 px-6">
        <div class="text-center landscape:flex-1">
            <div id="timer-display" class="text-7xl md:text-8xl landscape:text-6xl landscape:md:text-8xl font-bold tracking-tighter text-white transition-all duration-300">
                03:00
            </div>
            <div id="status-text" class="text-sm uppercase tracking-widest text-gray-400 font-semibold mt-2 landscape:mt-1">
                Listo para entrenar
            </div>
        </div>

        <div class="w-full max-w-sm flex flex-col gap-3 landscape:gap-2 landscape:flex-1 landscape:max-w-xs">
            <button id="btn-30s" class="w-full bg-zinc-800 hover:bg-zinc-700 active:scale-98 transition-all py-4 landscape:py-2.5 px-6 rounded-2xl flex flex-col items-center justify-center border border-zinc-700 shadow-lg cursor-pointer">
                <span class="text-lg landscape:text-base font-bold tracking-wide">30 SEGUNDOS</span>
                <span class="text-xs text-zinc-400 mt-0.5">Entre Series</span>
            </button>

            <button id="btn-3m" class="w-full bg-[#1DB954] hover:bg-[#1ed760] text-black active:scale-98 transition-all py-5 landscape:py-3 px-6 rounded-2xl flex flex-col items-center justify-center font-bold shadow-[0_0_20px_rgba(29,185,84,0.3)] cursor-pointer">
                <span class="text-xl landscape:text-lg tracking-wide">3 MINUTOS</span>
                <span class="text-xs text-black/70 font-semibold mt-0.5">Descanso Largo + Reanuda tu playlist 🎵</span>
            </button>
        </div>
    </div>

    <!-- PANEL DE CONEXIÓN CON SPOTIFY (se abre/cierra al tocar el estado superior) -->
    <div id="spotify-embed-panel" class="w-full px-6">
        <!-- PASO 1: iniciar sesión con tus credenciales de Spotify -->
        <div id="login-row" class="flex flex-col gap-2 mb-2">
            <button id="btn-spotify-login" class="w-full bg-[#1DB954] hover:bg-[#1ed760] text-black font-bold py-3 rounded-xl active:scale-98 transition-all cursor-pointer flex items-center justify-center gap-2">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424c-.18.295-.565.387-.86.207-2.377-1.454-5.37-1.783-8.894-.982-.336.075-.668-.135-.744-.47-.075-.336.135-.668.47-.743 3.856-.88 7.15-.51 9.822 1.13.296.178.387.563.206.858z"/></svg>
                1. INICIAR SESIÓN EN SPOTIFY
            </button>
            <button id="btn-ya-inicie" class="w-full bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-white text-sm font-semibold py-2.5 rounded-xl active:scale-98 transition-all cursor-pointer">
                2. Ya inicié sesión → recargar reproductor
            </button>
            <p class="text-[11px] text-zinc-500 text-center leading-snug">
                Se abrirá Spotify en otra pestaña para que ingreses tu correo y contraseña. Cuando termines, vuelve aquí y toca el botón 2. (Se requiere Spotify Premium para canciones completas.)
            </p>
        </div>
        <div id="embed-iframe" class="rounded-2xl overflow-hidden"></div>
    </div>

    <!-- REPRODUCTOR INFERIOR -->
    <div class="w-full bg-zinc-900/90 backdrop-blur-md border-t border-zinc-800 px-6 py-4 landscape:py-2 flex flex-col gap-2 landscape:gap-1 shrink-0">
        <div class="w-full bg-zinc-700 h-1 rounded-full overflow-hidden">
            <div id="music-progress" class="bg-[#1DB954] h-full w-0 transition-all duration-1000"></div>
        </div>

        <div class="flex justify-between items-center">
            <div class="flex flex-col min-w-[120px]">
                <span id="track-title" class="text-sm font-medium truncate">Conecta tu Spotify arriba</span>
                <span id="track-artist" class="text-xs text-zinc-400 truncate">Gym Playlist</span>
            </div>

            <div class="flex items-center gap-6 landscape:gap-4">
                <button id="btn-prev" title="Retroceder 15s" class="control-disabled text-zinc-400 hover:text-white active:scale-90 transition-transform cursor-pointer">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6L18 6v12z"/></svg>
                </button>
                <button id="btn-play-pause" title="Reproducir/Pausar" class="control-disabled w-10 h-10 landscape:w-9 landscape:h-9 rounded-full bg-white text-black flex items-center justify-center hover:scale-105 active:scale-95 transition-all shadow-md cursor-pointer">
                    <svg id="play-icon" class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" class="w-5 h-5 fill-current hidden" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button id="btn-next" title="Avanzar 15s" class="control-disabled text-zinc-400 hover:text-white active:scale-90 transition-transform cursor-pointer">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18V6l8.5 6zm10-12h2v12h-2z"/></svg>
                </button>
            </div>

            <div class="hidden sm:flex items-center gap-2 text-zinc-400">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                <div class="w-16 bg-zinc-700 h-1 rounded-full">
                    <div class="bg-zinc-400 h-full w-4/6 rounded-full"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- LÓGICA DE JAVASCRIPT -->
    <script>
        /* =====================================================
           CONFIG
        ===================================================== */
        const PLAYLIST_ID = '0OjsxoKKHTbu3GDPCURr9g';
        const PLAYLIST_URI = `spotify:playlist:${PLAYLIST_ID}`;
        const PLAYLIST_URL = `https://open.spotify.com/playlist/${PLAYLIST_ID}`;
        // Página de login de Spotify: al terminar te deja en open.spotify.com
        // con la sesión activa, que es la misma que usa el reproductor de aquí.
        const SPOTIFY_LOGIN_URL = `https://accounts.spotify.com/es/login?continue=${encodeURIComponent(PLAYLIST_URL)}`;

        /* =====================================================
           ELEMENTOS DOM
        ===================================================== */
        const timerDisplay = document.getElementById('timer-display');
        const statusText = document.getElementById('status-text');
        const btn30s = document.getElementById('btn-30s');
        const btn3m = document.getElementById('btn-3m');
        const tracktitle = document.getElementById('track-title');
        const trackArtist = document.getElementById('track-artist');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const btnPlayPause = document.getElementById('btn-play-pause');
        const btnNext = document.getElementById('btn-next');
        const btnPrev = document.getElementById('btn-prev');
        const musicProgress = document.getElementById('music-progress');
        const spotifyStatusBtn = document.getElementById('spotify-status');
        const spotifyStatusDot = document.getElementById('spotify-status-dot');
        const spotifyStatusText = document.getElementById('spotify-status-text');
        const spotifyPanel = document.getElementById('spotify-embed-panel');
        const btnSpotifyLogin = document.getElementById('btn-spotify-login');
        const btnYaInicie = document.getElementById('btn-ya-inicie');
        const loginRow = document.getElementById('login-row');

        let countdownInterval = null;
        let timeLeft = 180;
        let wakeLock = null;

        /* =====================================================
           WAKE LOCK — pantalla SIEMPRE encendida mientras la
           página esté abierta en primer plano (no depende del timer)
        ===================================================== */
        async function solicitarWakeLock() {
            if (!('wakeLock' in navigator)) return;
            try {
                if (wakeLock !== null) return; // ya está activo
                wakeLock = await navigator.wakeLock.request('screen');
                wakeLock.addEventListener('release', () => {
                    wakeLock = null;
                });
                console.log('Wake Lock activo.');
            } catch (err) {
                console.log(`Error Wake Lock: ${err.message}`);
            }
        }

        // FALLBACK adicional: video invisible en loop
        function iniciarVideoNoSleep() {
            try {
                if (window.__noSleepVideo) {
                    window.__noSleepVideo.play().catch(() => {});
                    return;
                }
                const canvas = document.createElement('canvas');
                canvas.width = 1;
                canvas.height = 1;
                const ctx = canvas.getContext('2d');
                ctx.fillRect(0, 0, 1, 1);
                const stream = canvas.captureStream(1);
                const video = document.createElement('video');
                video.srcObject = stream;
                video.muted = true;
                video.setAttribute('muted', '');
                video.playsInline = true;
                video.setAttribute('playsinline', '');
                video.loop = true;
                video.style.position = 'fixed';
                video.style.width = '1px';
                video.style.height = '1px';
                video.style.opacity = '0';
                video.style.pointerEvents = 'none';
                document.body.appendChild(video);
                video.play().catch(() => {});
                window.__noSleepVideo = video;
            } catch (e) {
                console.log('No se pudo iniciar el fallback anti-bloqueo:', e.message);
            }
        }

        function reforzarPantallaEncendida() {
            solicitarWakeLock();
            iniciarVideoNoSleep();
        }

        reforzarPantallaEncendida();
        setInterval(reforzarPantallaEncendida, 15000);
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                reforzarPantallaEncendida();
            }
        });
        document.addEventListener('click', reforzarPantallaEncendida);

        /* =====================================================
           PITIDOS DEL TEMPORIZADOR
        ===================================================== */
        function reproducirPitidoInicio() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(660, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            } catch (e) {
                console.error('Error audio inicio:', e);
            }
        }

        function reproducirAlarmaFin() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let tiempo = audioCtx.currentTime;
                for (let i = 0; i < 3; i++) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, tiempo);
                    gain.gain.setValueAtTime(0.6, tiempo);
                    gain.gain.exponentialRampToValueAtTime(0.01, tiempo + 0.3);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(tiempo);
                    osc.stop(tiempo + 0.4);
                    tiempo += 0.5;
                }
            } catch (e) {
                console.error('Error audio fin:', e);
            }
            if (navigator.vibrate) {
                navigator.vibrate([200, 100, 200, 100, 200]);
            }
        }

        function actualizarPantalla() {
            const minutos = Math.floor(timeLeft / 60);
            const segundos = timeLeft % 60;
            timerDisplay.textContent = `${minutos.toString().padStart(2, '0')}:${segundos.toString().padStart(2, '0')}`;
        }

        function iniciarTemporizador(segundosTotales, modoTexto) {
            clearInterval(countdownInterval);
            reforzarPantallaEncendida();
            reproducirPitidoInicio();

            timeLeft = segundosTotales;
            statusText.textContent = modoTexto;
            statusText.classList.remove('text-zinc-400', 'text-red-500');
            statusText.classList.add('text-[#1DB954]');
            actualizarPantalla();

            if (isPaused) {
                reanudarSpotify();
            }

            countdownInterval = setInterval(() => {
                timeLeft--;
                actualizarPantalla();

                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    statusText.textContent = '¡Tiempo Terminado!';
                    statusText.classList.remove('text-[#1DB954]');
                    statusText.classList.add('text-red-500');
                    reproducirAlarmaFin();
                    pausarSpotify();
                }
            }, 1000);
        }

        btn30s.addEventListener('click', () => iniciarTemporizador(30, 'Descanso Corto (Entre Series)'));
        btn3m.addEventListener('click', () => iniciarTemporizador(180, 'Descanso Largo'));

        /* =====================================================
           SPOTIFY — iFrame API + LOGIN
           El iframe de Spotify usa la sesión de spotify.com de
           este navegador. Como el iframe no muestra formulario
           de credenciales, el botón "INICIAR SESIÓN" abre
           Spotify en otra pestaña para que ingreses tu correo y
           contraseña; al volver, el botón 2 recarga el
           reproductor y toma tu sesión.
        ===================================================== */
        let spotifyController = null;
        let spotifyReady = false;
        let isPaused = true;
        let posicionActualMs = 0;
        let iframeAPIGlobal = null;

        function setEstadoSpotify(dotClass, texto) {
            spotifyStatusDot.className = `w-2 h-2 rounded-full ${dotClass}`;
            spotifyStatusText.textContent = texto;
        }

        function habilitarControles(habilitar) {
            [btnPlayPause, btnPrev, btnNext].forEach(btn => {
                btn.classList.toggle('control-disabled', !habilitar);
            });
        }

        // Toggle manual del panel (tocando el estado superior)
        spotifyStatusBtn.addEventListener('click', () => {
            spotifyPanel.classList.toggle('abierto');
        });

        // Abrir el panel automáticamente al cargar para que puedas iniciar sesión
        window.addEventListener('load', () => {
            spotifyPanel.classList.add('abierto');
        });

        // BOTÓN 1: abre Spotify en otra pestaña para ingresar credenciales
        btnSpotifyLogin.addEventListener('click', () => {
            window.open(SPOTIFY_LOGIN_URL, '_blank');
            setEstadoSpotify('bg-yellow-500 animate-pulse', 'INICIA SESIÓN EN LA OTRA PESTAÑA Y VUELVE');
        });

        // BOTÓN 2: recrea el iframe para que tome la sesión recién iniciada
        btnYaInicie.addEventListener('click', () => {
            recrearReproductor();
        });

        function recrearReproductor() {
            const contenedor = document.getElementById('embed-iframe');
            // Vaciar y volver a crear el controller con la sesión nueva
            contenedor.innerHTML = '';
            const nuevo = document.createElement('div');
            contenedor.appendChild(nuevo);
            if (iframeAPIGlobal) {
                crearController(iframeAPIGlobal, nuevo);
                setEstadoSpotify('bg-yellow-500 animate-pulse', 'RECARGANDO REPRODUCTOR...');
            } else {
                // Si la API aún no cargó, recargamos toda la página
                location.reload();
            }
        }

        function crearController(IFrameAPI, element) {
            const options = {
                uri: PLAYLIST_URI,
                width: '100%',
                height: 152,
            };
            IFrameAPI.createController(element, options, (controller) => {
                spotifyController = controller;

                controller.addListener('ready', () => {
                    spotifyReady = true;
                    setEstadoSpotify('bg-yellow-500 animate-pulse', 'DALE PLAY ABAJO PARA COMPROBAR TU SESIÓN');
                });

                controller.addListener('playback_started', (e) => {
                    setEstadoSpotify('bg-green-500 animate-pulse', 'SPOTIFY CONECTADO');
                    habilitarControles(true);
                    // Oculta los botones de login y colapsa el panel: ya funciona
                    loginRow.classList.add('hidden');
                    spotifyPanel.classList.remove('abierto');
                    actualizarMetadataCancion(e.data.playingURI);
                });

                controller.addListener('playback_update', (e) => {
                    isPaused = e.data.isPaused;
                    posicionActualMs = e.data.position || 0;
                    const duracionMs = e.data.duration || 0;

                    playIcon.classList.toggle('hidden', !isPaused);
                    pauseIcon.classList.toggle('hidden', isPaused);

                    if (duracionMs > 0) {
                        const porcentaje = Math.min(100, (posicionActualMs / duracionMs) * 100);
                        musicProgress.style.width = `${porcentaje}%`;
                    }
                });
            });
        }

        window.onSpotifyIframeApiReady = (IFrameAPI) => {
            iframeAPIGlobal = IFrameAPI;
            const element = document.getElementById('embed-iframe');
            const inner = document.createElement('div');
            element.appendChild(inner);
            crearController(IFrameAPI, inner);
        };

        // Si el script de Spotify tarda o falla en cargar, avisamos
        setTimeout(() => {
            if (!spotifyReady) {
                setEstadoSpotify('bg-red-500', 'NO SE PUDO CARGAR SPOTIFY (revisa tu conexión)');
            }
        }, 8000);

        async function actualizarMetadataCancion(playingURI) {
            try {
                if (!playingURI || !playingURI.startsWith('spotify:track:')) return;
                const trackId = playingURI.split(':')[2];
                const url = `https://open.spotify.com/oembed?url=https://open.spotify.com/track/${trackId}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('oEmbed no disponible');
                const data = await res.json();
                tracktitle.textContent = data.title || 'Reproduciendo...';
            } catch (e) {
                tracktitle.textContent = 'Reproduciendo desde Spotify';
                console.log('No se pudo obtener el título real:', e.message);
            }
        }

        // Nombre de la playlist como subtítulo (dato real, vía oEmbed público)
        (async function cargarNombrePlaylist() {
            try {
                const res = await fetch(`https://open.spotify.com/oembed?url=${PLAYLIST_URL}`);
                if (!res.ok) throw new Error('sin acceso');
                const data = await res.json();
                trackArtist.textContent = data.title || 'Tu Playlist';
            } catch (e) {
                console.log('No se pudo obtener el nombre de la playlist:', e.message);
            }
        })();

        function reanudarSpotify() {
            if (spotifyController && spotifyReady) {
                spotifyController.resume();
            }
        }

        function pausarSpotify() {
            if (spotifyController && spotifyReady) {
                spotifyController.pause();
            }
        }

        btnPlayPause.addEventListener('click', () => {
            if (!spotifyController || !spotifyReady) return;
            spotifyController.togglePlay();
        });

        // Sin "siguiente/anterior" oficial en la API pública de Spotify:
        // estos botones avanzan/retroceden 15s en la canción actual.
        btnNext.addEventListener('click', () => {
            if (!spotifyController || !spotifyReady) return;
            spotifyController.seek(Math.floor(posicionActualMs / 1000) + 15);
        });

        btnPrev.addEventListener('click', () => {
            if (!spotifyController || !spotifyReady) return;
            spotifyController.seek(Math.max(0, Math.floor(posicionActualMs / 1000) - 15));
        });
    </script>
</body>
</html>
